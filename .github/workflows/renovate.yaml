---
name: Renovate

on:
  schedule:
    - cron: "15 */2 * * *"
  workflow_dispatch:
    inputs:
      log_level:
        description: Renovate log level
        required: false
        default: info
        type: choice
        options:
          - info
          - debug
          - warn
      dry_run:
        description: Log-only dry run (no PR/commit writes)
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: renovate-${{ github.repository }}
  cancel-in-progress: false

jobs:
  renovate:
    name: Run Renovate
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@v46.1.18
        env:
          LOG_LEVEL: ${{ github.event.inputs.log_level || 'info' }}
          RENOVATE_DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && 'full' || '' }}
          RENOVATE_PLATFORM: github
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_GIT_AUTHOR: Renovate Bot <renovate@users.noreply.github.com>
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
          configurationFile: renovate.json
